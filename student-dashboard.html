<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особистий кабінет | Logika</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <h2>Logika Vika</h2>
        <button id="btn-dashboard" class="active" onclick="switchTab('dashboard')">Мій кабінет</button>        
        <button id="btn-curriculum" onclick="switchTab('curriculum')">Програма курсів</button>
        <button class="logout-btn" onclick="logout()">Вийти з системи</button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="header-actions">
                <h1 id="page-title">Особистий кабінет</h1>
            </div>
            <div class="user-info">
                Привіт, <strong id="userName">Учень</strong>! 
            </div>
        </div>

        <div id="content-area">
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3 class="stat-title">Мої Логіки</h3>
                    <p id="studentLogikas" class="stat-value-green">0</p>
                </div>
                <div class="stat-card">
                    <h3 class="stat-title">Залишок занять</h3>
                    <p id="studentLessons" class="stat-value-purple">0</p>
                </div>
            </div>

            <div id="nearest-lesson-box" class="mb-25"></div>

            <div class="mt-20">
                <button id="toggleScheduleBtn" class="btn-secondary" onclick="toggleFullSchedule()">Розгорнути весь розклад</button>
            </div>

            <div id="full-schedule-container" class="hidden-container mt-20">
                <h3 class="schedule-title">Усі заняття курсу</h3>
                <div id="schedule-area">
                    <p>Завантаження розкладу...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="submitHomeworkModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Здати домашнє завдання</h3>
            <p id="modalLessonTopic" style="font-weight: bold; margin-bottom: 15px; color: #4a76a8;"></p>
            
            <div class="materials-card" style="background: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
                <p><strong>Завдання від викладача:</strong></p>
                <a id="modalTaskLink" href="#" target="_blank" class="btn-secondary" style="display: inline-block; margin-top: 5px; text-decoration: none; padding: 8px 12px;">🔗 Відкрити сторінку завдання</a>
            </div>

            <div class="input-group">
                <label for="studentHomeworkUrl"><strong>Твоя виконана робота (посилання):</strong></label>
                <input type="url" id="studentHomeworkUrl" placeholder="Встав посилання на свій проєкт Scratch або Roblox" style="width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ced6e0; border-radius: 5px;">
            </div>
            
            <p id="submissionStatus" style="margin-top: 10px; font-size: 0.9em; display: none; font-weight: bold;"></p>

            <div class="btn-actions" style="margin-top: 20px;">
                <button type="button" class="btn-secondary" onclick="closeHomeworkModal()">Закрити</button>
                <button type="button" class="btn-primary" id="submitHomeworkBtn">Здати роботу</button>
            </div>
        </div>
    </div>

    <script src="student-dashboard.js"></script>
</body>
</html>
