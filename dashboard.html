<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logika Vika</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body> 
    <div class="sidebar">
        <h2>Logika Vika</h2>
        <button id="btn-students" class="active" onclick="switchTab('students')">Учні</button>
        <button id="btn-groups" onclick="switchTab('groups')">Групи</button>
        <button id="btn-schedule" onclick="switchTab('schedule')">Розклад</button>
        <button id="btn-teachers" onclick="switchTab('teachers')">Викладачі</button>
        <button id="btn-tasks" onclick="switchTab('tasks')">Задачник</button>
        <button id="btn-curriculum" onclick="switchTab('curriculum')">Програма курсів</button>
        <button class="logout-btn" onclick="logout()">Вийти з системи</button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="header-actions">
                <h1 id="page-title">Контингент учнів</h1>
            </div>
            <div class="user-info">
                Вітаємо, <strong id="userName">Користувач</strong>! 
            </div>
        </div>
        <div id="content-area">
            <p>Завантаження даних...</p>
        </div>
    </div>

    <div id="addStudentModal" class="modal">
        <div class="modal-content">
            <h3>Реєстрація нового учня</h3>
            <form id="addStudentForm">
                <div class="input-group">
                    <label for="studentName">ПІБ учня</label>
                    <input type="text" id="studentName" required minlength="4" maxlength="25">
                </div>
                <div class="input-group">
                    <label for="studentAge">Вік</label>
                    <input type="number" id="studentAge" required min="7" max="18">
                </div>
                <div class="input-group">
                    <label for="studentPhone">Телефон батьків</label>
                    <input type="text" id="studentPhone" required>
                </div>
                <div class="input-group">
                    <label for="studentGroupId">ID Групи</label>
                    <input type="number" id="studentGroupId">
                </div>
                <div class="btn-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddStudentModal()">Скасувати</button>
                    <button type="submit" class="btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addGroupModal" class="modal">
        <div class="modal-content">
            <h3>Створення нової групи</h3>
            <form id="addGroupForm">
                <div class="input-group">
                    <label for="groupName">Назва групи</label>
                    <input type="text" id="groupName" required>
                </div>
                <div class="input-group">
                    <label for="groupCourseId">ID Курсу</label>
                    <input type="number" id="groupCourseId">
                </div>
                <div class="input-group">
                    <label for="groupTeacherId">ID Викладача</label>
                    <input type="number" id="groupTeacherId">
                </div>
                <div class="btn-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddGroupModal()">Скасувати</button>
                    <button type="submit" class="btn-primary">Створити</button>
                </div>
            </form>
        </div>
    </div>

    <div id="generateScheduleModal" class="modal">
        <div class="modal-content">
            <h3>Запуск групи (Авто-розклад)</h3>
            <form id="generateScheduleForm">
                <div class="input-group">
                    <label for="genGroupId">ID Групи</label>
                    <input type="number" id="genGroupId" required>
                </div>
                <div class="input-group">
                    <label for="genStartDate">Дата та час першого заняття</label>
                    <input type="datetime-local" id="genStartDate" required>
                </div>
                <div class="btn-actions">
                    <button type="button" class="btn-secondary" onclick="closeGenerateModal()">Скасувати</button>
                    <button type="submit" class="btn-primary">Згенерувати</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addTeacherModal" class="modal">
        <div class="modal-content">
            <h3>Додати нового викладача</h3>
            <form id="addTeacherForm">
                <div class="input-group">
                    <label for="teacherName">ПІБ викладача</label>
                    <input type="text" id="teacherName" required minlength="4" maxlength="25" placeholder="Наприклад: Шевченко Т. Г.">
                </div>
                <div class="input-group">
                    <label for="teacherLogin">Логін для входу</label>
                    <input type="text" id="teacherLogin" required placeholder="Наприклад: tshevchenko">
                </div>
                <div class="input-group">
                    <label for="teacherPassword">Пароль</label>
                    <input type="password" id="teacherPassword" required placeholder="Мінімум 4 символи">
                </div>
                <div class="btn-actions">
                    <button type="button" class="btn-secondary" onclick="closeAddTeacherModal()">Скасувати</button>
                    <button type="submit" class="btn-primary">Зберегти викладача</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/uk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
