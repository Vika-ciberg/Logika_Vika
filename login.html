<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Logika Vika</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-card">
        <h2>Вхід у систему</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="login">Логін</label>
                <input type="text" id="login" required placeholder="Введіть логін">
            </div>
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" required placeholder="Введіть пароль">
            </div>
            <button type="submit" class="login-btn">Увійти</button>
            <div id="error-message"></div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
